<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500" role="img" aria-label="Bách Hóa Nails Logo">
  <defs>
    <!-- Inner circle gradient -->
    <radialGradient id="innerBg" cx="45%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="55%" stop-color="#FFF8FC"/>
      <stop offset="100%" stop-color="#FFE8F4"/>
    </radialGradient>
    <!-- Drop shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#1A1A2E" flood-opacity="0.28"/>
    </filter>
    <!-- Curved text path — clockwise over the top, r=192 -->
    <path id="topArc" d="M 58,250 A 192,192 0 0,1 442,250"/>
    <!-- Bottom decorative text path — counter-clockwise under bottom, r=192 -->
    <path id="botArc" d="M 58,250 A 192,192 0 0,0 442,250"/>
  </defs>

  <!-- ── LAYER 1: Navy outer ring (base + shadow) ── -->
  <circle cx="250" cy="250" r="240" fill="#1A1A2E" filter="url(#shadow)"/>

  <!-- ── LAYER 2: Gold band ── -->
  <circle cx="250" cy="250" r="228" fill="#FFD700"/>

  <!-- ── LAYER 3: Pink band ── -->
  <circle cx="250" cy="250" r="219" fill="#E91E8C"/>

  <!-- ── LAYER 4: Navy text ring ── -->
  <circle cx="250" cy="250" r="210" fill="#1A1A2E"/>

  <!-- ── LAYER 5: Gold inner border ── -->
  <circle cx="250" cy="250" r="168" fill="#FFD700"/>

  <!-- ── LAYER 6: Pink thin ring ── -->
  <circle cx="250" cy="250" r="161" fill="#E91E8C"/>

  <!-- ── LAYER 7: Inner circle ── -->
  <circle cx="250" cy="250" r="154" fill="url(#innerBg)"/>

  <!-- ══════════════════════════════════════════
       CURVED TEXT — "BÁCH HÓA · NAILS" at top
  ══════════════════════════════════════════ -->
  <text font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="20" font-weight="800" fill="#FFD700"
        letter-spacing="3.5">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">BÁCH HÓA  ·  NAILS</textPath>
  </text>

  <!-- Curved bottom label -->
  <text font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="11.5" font-weight="500" fill="#F5A7D0"
        letter-spacing="2">
    <textPath href="#botArc" startOffset="50%" text-anchor="middle">bachhoanails.com  ·  since 2025</textPath>
  </text>

  <!-- ══════════════════════════════════════════
       STARS — left and right in navy ring
  ══════════════════════════════════════════ -->
  <!-- Left star at ~(42, 250) -->
  <g transform="translate(42,250)">
    <path d="M0,-7.5 L1.73,-2.38 L6.54,-2.27 L2.63,0.88 L4.02,5.85 L0,3 L-4.02,5.85 L-2.63,0.88 L-6.54,-2.27 L-1.73,-2.38 Z"
          fill="#FFD700"/>
  </g>
  <!-- Right star at ~(458, 250) -->
  <g transform="translate(458,250)">
    <path d="M0,-7.5 L1.73,-2.38 L6.54,-2.27 L2.63,0.88 L4.02,5.85 L0,3 L-4.02,5.85 L-2.63,0.88 L-6.54,-2.27 L-1.73,-2.38 Z"
          fill="#FFD700"/>
  </g>

  <!-- Small diamonds top/bottom of navy ring -->
  <!-- Top diamond (250, 40) -->
  <polygon points="250,33 254,40 250,47 246,40" fill="#FFD700" opacity="0.85"/>
  <!-- Bottom diamond (250, 460) -->
  <polygon points="250,453 254,460 250,467 246,460" fill="#FFD700" opacity="0.85"/>

  <!-- Small accent dots flanking stars -->
  <circle cx="78"  cy="188" r="2" fill="#FFD700" opacity="0.6"/>
  <circle cx="422" cy="188" r="2" fill="#FFD700" opacity="0.6"/>
  <circle cx="78"  cy="312" r="2" fill="#FFD700" opacity="0.6"/>
  <circle cx="422" cy="312" r="2" fill="#FFD700" opacity="0.6"/>

  <!-- ══════════════════════════════════════════
       NAIL POLISH BOTTLE ICON — top of inner circle
  ══════════════════════════════════════════ -->
  <g transform="translate(250,155)">
    <!-- Cap (navy) -->
    <rect x="-9" y="-22" width="18" height="14" rx="3" fill="#1A1A2E"/>
    <!-- Neck -->
    <rect x="-4.5" y="-9" width="9" height="7" rx="1.5" fill="#C2157A"/>
    <!-- Bottle body -->
    <rect x="-13" y="-3" width="26" height="30" rx="6" fill="#E91E8C"/>
    <!-- Bottom curve of bottle -->
    <ellipse cx="0" cy="27" rx="13" ry="5" fill="#C2157A"/>
    <!-- Shine highlight -->
    <rect x="-6" y="1" width="4.5" height="20" rx="2.25" fill="white" opacity="0.28"/>
    <!-- Brush handle -->
    <rect x="-2" y="27" width="4" height="16" rx="2" fill="#1A1A2E"/>
    <!-- Brush tip -->
    <ellipse cx="0" cy="43" rx="3" ry="4.5" fill="#1A1A2E"/>
    <!-- Tiny sparkle above cap -->
    <text x="0" y="-26" font-size="10" text-anchor="middle" fill="#FFD700">✦</text>
  </g>

  <!-- ══════════════════════════════════════════
       TL MONOGRAM — main centerpiece
  ══════════════════════════════════════════ -->
  <!-- Subtle shadow for TL -->
  <text x="252" y="306"
        font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-size="120" font-weight="900"
        text-anchor="middle"
        fill="#E91E8C" opacity="0.15"
        letter-spacing="-6">TL</text>
  <!-- Main TL -->
  <text x="250" y="304"
        font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-size="120" font-weight="900"
        text-anchor="middle"
        fill="#1A1A2E"
        letter-spacing="-6">TL</text>

  <!-- Pink underline bar -->
  <rect x="168" y="313" width="164" height="5.5" rx="2.75" fill="#E91E8C"/>

  <!-- ══════════════════════════════════════════
       DECORATIVE SPARKLE DOTS in inner circle
  ══════════════════════════════════════════ -->
  <circle cx="118" cy="220" r="3.5" fill="#E91E8C" opacity="0.22"/>
  <circle cx="382" cy="220" r="3.5" fill="#E91E8C" opacity="0.22"/>
  <circle cx="112" cy="302" r="2.5" fill="#FFD700" opacity="0.35"/>
  <circle cx="388" cy="302" r="2.5" fill="#FFD700" opacity="0.35"/>
  <circle cx="148" cy="358" r="2"   fill="#E91E8C" opacity="0.2"/>
  <circle cx="352" cy="358" r="2"   fill="#E91E8C" opacity="0.2"/>
</svg>
